<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img src="./assets/logo.png" />
          <p>Task Manager</p>
        </div>
        <div class="theme-toggle">
          <img id="toggle-img" src="./assets/moon.svg" alt="theme toggle" />
        </div>
      </nav>
      <section class="hero">
        <h1>Good <span id="greet"></span> ✨</h1>
        <p><strong>Today's overview: </strong></p>
        <table id="dashboard">
          <tr>
            <th>Total Tasks</th>
            <td id="tot-tasks">-</td>
          </tr>
          <tr>
            <th>Pending</th>
            <td id="pending">-</td>
          </tr>
        </table>
      </section>
    </header>

    <main>
      <section class="add-task border">
        <div class="bottom-border border">
          <h2>Add New Task</h2>
          <p>Stay organized by creating your next task.</p>
        </div>
        <div class="bottom-border task border">
          <span><button class="add-btn">+</button></span>
          <p>New Task</p>
        </div>
      </section>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
