<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img src="./assets/logo.png" />
          <p>Task Manager</p>
        </div>
        <div class="theme-toggle">
          <img id="toggle-img" src="./assets/moon.svg" alt="theme toggle" />
        </div>
      </nav>
      <section class="hero">
        <h1 class="bottom-border">Good <span id="greet"></span> ✨</h1>
        <div id="dashboard">
          <p><strong>Today's overview: </strong></p>
          <table id="dashboard">
            <tr>
              <th>Total Tasks</th>
              <td id="tot-tasks">-</td>
            </tr>
            <tr>
              <th>Pending</th>
              <td id="pending">-</td>
            </tr>
          </table>
        </div>
      </section>
    </header>

    <main>
      <section class="add-task">
        <div class="bottom-border new-task">
          <h2>Add New Task</h2>
          <p>Stay organized by creating your next task.</p>
        </div>

        <div class="bottom-border task">
          <button class="task-btn">+</button>
          <p>New Task</p>
        </div>

        <div class="bottom-border hidden task-form">
          <form
            onsubmit="
              taskAdd();
              return false;
            "
            method="POST"
          >
            <input type="text" class="task-name" placeholder="Enter Task" />
            <button class="task-add">Add</button>
          </form>
        </div>
      </section>

      <section class="task-section">
        <h2>Your Tasks 📝</h2>
        <ol class="task-lists"></ol>
      </section>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
